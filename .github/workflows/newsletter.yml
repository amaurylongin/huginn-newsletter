name: Revue Huginn — envoi hebdomadaire

on:
  # ============================================================
  # PLANIFICATION : tous les lundis à 08h00 heure de Paris
  # ============================================================
  # Le cron est en UTC. 08h00 Paris = 06h00 UTC en été (heure d'été),
  #                    08h00 Paris = 07h00 UTC en hiver.
  # Par défaut on met 07h00 UTC (compromis) — ajustez la valeur ci-dessous
  # pour modifier le jour / l'heure.
  #
  # FORMAT CRON : "minute heure jour-du-mois mois jour-de-semaine"
  # Exemples :
  #   "0 7 * * 1"   → lundi 07h00 UTC (08h00 hiver / 09h00 été à Paris)
  #   "0 6 * * 1"   → lundi 06h00 UTC (07h00 hiver / 08h00 été à Paris)
  #   "30 17 * * 5" → vendredi 17h30 UTC
  #
  # Convertisseur : https://crontab.guru
  # ============================================================
  schedule:
    - cron: "0 6 * * 1"

  # Permet aussi un déclenchement manuel depuis l'onglet "Actions"
  workflow_dispatch:

jobs:
  run-huginn:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # autorisation de commit l'archive

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Exécution de HUGINN
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          GH_PAGES_URL: ${{ vars.GH_PAGES_URL }}
          GH_MODE: ${{ vars.GH_MODE }}
        run: python src/main.py

      - name: Commit de l'archive sur le repo
        run: |
          git config user.name "Huginn Bot"
          git config user.email "huginn-bot@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "📰 Nouvelle édition Huginn"
            git push
          fi
